name: macOS Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-15-intel
            arch: Intel (x86_64)
          - os: macos-latest
            arch: Apple Silicon (ARM64)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Run Tests
        run: |
          make test
          
      - name: Parse Results Summary
        if: always()
        run: |
          if [ ! -f ./bin/TestSuite ]; then
            echo "Error: ./bin/TestSuite not found. The build likely failed or was cancelled."
            exit 1
          fi
          
          RESULTS=$(./bin/TestSuite | grep "Summary:")
          echo "Test Result: $RESULTS"
          
          if [[ $RESULTS == *"Summary: 0/"* ]]; then
             echo "Error: No tests passed."
             exit 1
          fi
